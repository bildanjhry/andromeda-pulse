name: Adromeda E-commerce CI/CD
run-name: ${{github.actor}}'s workflow
on: 
  push : 
    tags: 
    - "v*"
jobs:
  build-run-andromeda:
    runs-on: ubuntu-latest
    steps:
        - name : Checkout Source Code
          uses: actions/checkout@v6

        - name : Login to Container Registry
          uses: docker/login-action@v4
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Push Docker App to Container Registry
          uses : docker/build-push-action@v7
          with:
            context: .
            push: true
            tags: ghcr.io/${{ github.repository }}/andromeda:latest
        
        - name: Re Build App
          uses: actions/checkout@v4
          run: npm i
          run: npm run build

        - name: Upload Artefact
          uses: actions/upload-artifact@v7
          with: 
            name: build-app-result
            id: upload-dist
            path: dist/ 

  release-app:
    name: Realese ready app
    needs: build-run-andromeda
    runs-on: ubuntu-latest
    steps:
        - name: Download Artifact
          uses: actions/download-artifact@v8
          with:
            name: build-app-result
            path: dist/
        
        - name: Compress artifact
          run: zip -r andromeda.zip ./*

        - name: Realese
          uses: softprops/action-gh-release@v3
          with: 
            files: | 
              andromeda.zip
        
